[package]
name = "mobius-arb"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
ethers = { version = "2", features = ["ws", "rustls"] }
ethers-contract = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dotenv = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
eyre = "0.6"
hex = "0.4"
dashmap = "5"
petgraph = "0.6"
num-bigint = "0.4"
num-traits = "0.2"
num-rational = "0.4"
